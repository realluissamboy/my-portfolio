// ========== STARFIELD ==========
function createStarfield() {
  const starCount = 8000;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(starCount * 3);
  const colors = new Float32Array(starCount * 3);
  const sizes = new Float32Array(starCount);

  for (let i = 0; i < starCount; i++) {
    const i3 = i * 3;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 1500 + Math.random() * 1500;

    positions[i3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i3 + 2] = r * Math.cos(phi);

    const brightness = 0.5 + Math.random() * 0.5;
    const tint = Math.random();
    colors[i3]     = tint > 0.7 ? brightness : brightness * 0.8;
    colors[i3 + 1] = tint > 0.4 ? brightness : brightness * 0.7;
    colors[i3 + 2] = brightness;

    sizes[i] = Math.random() * 2 + 0.5;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float size;
      attribute vec3 color;
      varying vec3 vColor;
      varying float vAlpha;
      uniform float uTime;
      void main() {
        vColor = color;
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        float twinkle = 0.5 + 0.5 * sin(uTime * (1.0 + fract(position.x * 100.0) * 3.0) + position.y);
        vAlpha = twinkle;
        gl_PointSize = size * (600.0 / -mv.z) * twinkle;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5);
        if (d > 0.5) discard;
        float glow = exp(-d * 6.0);
        gl_FragColor = vec4(vColor * glow, vAlpha * glow);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  return new THREE.Points(geo, mat);
}

const stars = createStarfield();

// ========== BLUE SUN ==========
function createSun() {
  const group = new THREE.Group();

  const coreGeo = new THREE.SphereGeometry(30, 64, 64);
  const coreMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec3 vNormal; varying vec2 vUv; varying vec3 vPosition;
      void main() {
        vNormal = normal; vUv = uv; vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime;
      varying vec3 vNormal; varying vec2 vUv; varying vec3 vPosition;
      float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
      float noise(vec2 p) {
        vec2 i = floor(p); vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        return mix(mix(hash(i), hash(i+vec2(1,0)), f.x), mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
      }
      float fbm(vec2 p) {
        float v=0.0, a=0.5;
        for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;} return v;
      }
      void main() {
        vec2 uv = vUv * 4.0;
        float n = fbm(uv + uTime * 0.15);
        float n2 = fbm(uv * 2.0 - uTime * 0.1);
        vec3 blue1 = vec3(0.0, 0.3, 1.0); vec3 blue2 = vec3(0.2, 0.6, 1.0);
        vec3 white = vec3(0.7, 0.85, 1.0); vec3 deep = vec3(0.0, 0.1, 0.5);
        vec3 color = mix(blue1, blue2, n);
        color = mix(color, white, pow(n2, 3.0) * 0.8);
        color = mix(deep, color, 0.3 + 0.7 * n);
        float fresnel = 1.0 - dot(vNormal, vec3(0,0,1));
        color *= (1.0 - fresnel * 0.3) * 1.8;
        gl_FragColor = vec4(color, 1.0);
      }
    `,
  });
  group.add(new THREE.Mesh(coreGeo, coreMat));

  // Glow layers
  for (let i = 1; i <= 4; i++) {
    const glowGeo = new THREE.SphereGeometry(30 + i * 8, 32, 32);
    const glowMat = new THREE.ShaderMaterial({
      uniforms: { uTime: { value: 0 }, uLayer: { value: i } },
      vertexShader: `
        varying vec3 vNormal;
        void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
      `,
      fragmentShader: `
        uniform float uTime; uniform float uLayer; varying vec3 vNormal;
        void main() {
          float intensity = pow(0.6 - dot(vNormal, vec3(0,0,1)), 2.0);
          float pulse = 0.8 + 0.2 * sin(uTime * 1.5 + uLayer);
          vec3 gc = mix(vec3(0,0.3,1), vec3(0.3,0.6,1), intensity);
          gl_FragColor = vec4(gc * 2.0, intensity * (0.25/uLayer) * pulse);
        }
      `,
      transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false,
    });
    group.add(new THREE.Mesh(glowGeo, glowMat));
  }

  // Corona particles
  const cCount = 3000;
  const cGeo = new THREE.BufferGeometry();
  const cPos = new Float32Array(cCount * 3);
  const cSizes = new Float32Array(cCount);
  const cOffsets = new Float32Array(cCount);
  for (let i = 0; i < cCount; i++) {
    const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1), r = 32+Math.random()*25;
    cPos[i*3]=r*Math.sin(p)*Math.cos(t); cPos[i*3+1]=r*Math.sin(p)*Math.sin(t); cPos[i*3+2]=r*Math.cos(p);
    cSizes[i]=Math.random()*3+1; cOffsets[i]=Math.random()*Math.PI*2;
  }
  cGeo.setAttribute('position', new THREE.BufferAttribute(cPos, 3));
  cGeo.setAttribute('size', new THREE.BufferAttribute(cSizes, 1));
  cGeo.setAttribute('offset', new THREE.BufferAttribute(cOffsets, 1));
  const cMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float size; attribute float offset; varying float vAlpha; uniform float uTime;
      void main() {
        vec3 pos = position + normalize(position) * sin(uTime*2.0+offset)*5.0;
        vec4 mv = modelViewMatrix * vec4(pos, 1.0);
        vAlpha = 0.5 + 0.5*sin(uTime*3.0+offset);
        gl_PointSize = size * (300.0/-mv.z); gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord-0.5); if(d>0.5)discard;
        float glow = exp(-d*5.0);
        gl_FragColor = vec4(0.3,0.6,1.0, vAlpha*glow*0.6);
      }
    `,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false,
  });
  group.add(new THREE.Points(cGeo, cMat));

  const sunLight = new THREE.PointLight(0x4488ff, 2.5, 2000);
  sunLight.castShadow = true;
  group.add(sunLight);
  scene.add(new THREE.AmbientLight(0x111133, 0.3));

  return group;
}

function createPlanetShader(p) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor1: { value: new THREE.Vector3(...p.color1) },
      uColor2: { value: new THREE.Vector3(...p.color2) },
      uColor3: { value: new THREE.Vector3(...p.color3) },
      uSunPos: { value: new THREE.Vector3(0, 0, 0) },
      uHover: { value: 0 },
    },
    vertexShader: `
      varying vec3 vNormal; varying vec2 vUv; varying vec3 vWorldPos;
      void main() {
        vNormal = normalize(normalMatrix * normal); vUv = uv;
        vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform float uTime, uHover;
      uniform vec3 uColor1, uColor2, uColor3, uSunPos;
      varying vec3 vNormal, vWorldPos; varying vec2 vUv;

      float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
      float noise(vec2 p){
        vec2 i=floor(p),f=fract(p); f=f*f*(3.0-2.0*f);
        return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);
      }
      float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}

      void main() {
        vec2 uv = vUv * 6.0;
        float n1 = fbm(uv + uTime*0.02), n2 = fbm(uv*1.5 - uTime*0.015);
        vec3 color = mix(uColor1, uColor2, n1);
        color = mix(color, uColor3, pow(n2, 2.0)*0.6);

        vec3 lightDir = normalize(uSunPos - vWorldPos);
        float diffuse = max(dot(vNormal, lightDir), 0.0);
        color *= 0.08 + diffuse * 1.2;

        vec3 viewDir = normalize(cameraPosition - vWorldPos);
        vec3 halfDir = normalize(lightDir + viewDir);
        color += vec3(0.3,0.5,1.0) * pow(max(dot(vNormal, halfDir), 0.0), 32.0) * 0.3;

        // Hover brightening
        color += color * uHover * 0.4;

        gl_FragColor = vec4(color, 1.0);
      }
    `,
  });
}

planetData.forEach((p, idx) => {
  const group = new THREE.Group();

  // Orbit line
  const orbitCurve = new THREE.EllipseCurve(0, 0, p.orbitRadius, p.orbitRadius, 0, Math.PI * 2, false, 0);
  const orbitPts = orbitCurve.getPoints(128);
  const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPts.map(pt => new THREE.Vector3(pt.x, 0, pt.y)));
  scene.add(new THREE.LineLoop(orbitGeo, new THREE.LineBasicMaterial({ color: 0x1a3366, transparent: true, opacity: 0.25 })));

  // Planet
  const planetGeo = new THREE.SphereGeometry(p.radius, 48, 48);
  const planetMat = createPlanetShader(p);
  const planet = new THREE.Mesh(planetGeo, planetMat);
  group.add(planet);

  // Atmosphere
  if (p.atmosphere) {
    const aGeo = new THREE.SphereGeometry(p.radius * 1.15, 32, 32);
    const aMat = new THREE.ShaderMaterial({
      uniforms: {
        uColor: { value: new THREE.Vector3(p.atmosphere[0], p.atmosphere[1], p.atmosphere[2]) },
        uIntensity: { value: p.atmosphere[3] },
        uHover: { value: 0 },
      },
      vertexShader: `varying vec3 vNormal; void main(){vNormal=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
      fragmentShader: `
        uniform vec3 uColor; uniform float uIntensity, uHover; varying vec3 vNormal;
        void main(){float g=pow(0.65-dot(vNormal,vec3(0,0,1)),2.0); gl_FragColor=vec4(uColor,g*(uIntensity+uHover*0.15));}
      `,
      transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false,
    });
    const atmos = new THREE.Mesh(aGeo, aMat);
    atmos.userData.isAtmosphere = true;
    group.add(atmos);
  }

  // Ring
  if (p.hasRing) {
    const rGeo = new THREE.RingGeometry(p.ringInner, p.ringOuter, 80);
    const rMat = new THREE.ShaderMaterial({
      uniforms: { uColor: { value: new THREE.Vector3(...p.ringColor) }, uTime: { value: 0 } },
      vertexShader: `varying vec2 vUv; void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
      fragmentShader: `
        uniform vec3 uColor; uniform float uTime; varying vec2 vUv;
        void main(){
          float r=length(vUv-0.5)*2.0; float bands=sin(r*60.0)*0.5+0.5;
          float alpha=bands*0.5*smoothstep(0.0,0.1,r)*smoothstep(1.0,0.8,r);
          alpha*=0.7+0.3*sin(vUv.x*20.0+uTime);
          gl_FragColor=vec4(uColor*(0.8+0.4*bands),alpha);
        }
      `,
      transparent: true, blending: THREE.AdditiveBlending, side: THREE.DoubleSide, depthWrite: false,
    });
    const ring = new THREE.Mesh(rGeo, rMat);
    ring.rotation.x = Math.PI * 0.45;
    ring.userData.ringMat = rMat;
    group.add(ring);
  }

  // Moon
  if (p.hasMoon) {
    const mGeo = new THREE.SphereGeometry(p.moonRadius, 24, 24);
    const mMat = new THREE.MeshStandardMaterial({ color: p.moonColor, roughness: 0.8, metalness: 0.1 });
    const moon = new THREE.Mesh(mGeo, mMat);
    moon.userData = { orbitRadius: p.moonOrbit, speed: p.moonSpeed };
    group.add(moon);
    group.userData.moon = moon;
  }

  group.userData = { ...p, planet, angle: (idx / planetData.length) * Math.PI * 2 };
  scene.add(group);
  planetMeshes.push(group);
});

// ========== ORBIT CONTROLS ==========
let isDragging = false, prevMouse = { x: 0, y: 0 };
let cameraAngle = { theta: 0.3, phi: 0.8 };
let cameraDistance = 650, targetDistance = 650;
let panelOpen = false;

document.addEventListener('mousedown', (e) => {
  if (panelOpen) return;
  isDragging = true;
  prevMouse.x = e.clientX; prevMouse.y = e.clientY;
});

document.addEventListener('mousemove', (e) => {
  if (isDragging && !panelOpen) {
    const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
    cameraAngle.theta -= dx * 0.005;
    cameraAngle.phi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraAngle.phi - dy * 0.005));
    prevMouse.x = e.clientX; prevMouse.y = e.clientY;
  }
  mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

document.addEventListener('mouseup', () => { isDragging = false; });

document.addEventListener('wheel', (e) => {
  if (panelOpen) return;
  targetDistance = Math.max(100, Math.min(1200, targetDistance + e.deltaY * 0.5));
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ========== CLICK TO OPEN PANEL ==========
document.addEventListener('click', (e) => {
  if (panelOpen) return;
  if (isDragging) return;

  raycaster.setFromCamera(mouseNDC, camera);
  const targets = planetMeshes.map(g => g.userData.planet);
  const intersects = raycaster.intersectObjects(targets);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const parentGroup = planetMeshes.find(g => g.userData.planet === hit);
    if (parentGroup) {
      openPanel(parentGroup.userData.name);
    }
  }
});

function openPanel(name) {
  const data = panelContent[name];
  if (!data) return;

  panelOpen = true;
  const el = document.getElementById('panel-content');

  let linksHTML = '';
  if (data.links) {
    linksHTML = `<div class="panel-links">${data.links.map(l =>
      `<a href="${l.url}" target="_blank" rel="noopener" class="panel-link">
        <span class="panel-link-icon">${l.icon}</span> ${l.label}
      </a>`
    ).join('')}</div>`;
  }

  el.style.setProperty('--planet-color1', data.color1);
  el.style.setProperty('--planet-color2', data.color2);
  el.innerHTML = `
    <button class="panel-close" onclick="closePanel()">&times;</button>
    <div class="panel-icon">${data.icon}</div>
    <div class="panel-title">${name}</div>
    <div class="panel-subtitle">${data.subtitle}</div>
    <div class="panel-body">${data.body}${linksHTML}</div>
    <div class="panel-tags">${data.tags.map(t => `<span class="panel-tag">${t}</span>`).join('')}</div>
  `;

  document.getElementById('panel-overlay').classList.add('active');
  document.getElementById('info-panel').classList.add('active');
}

function closePanel() {
  panelOpen = false;
  document.getElementById('panel-overlay').classList.remove('active');
  document.getElementById('info-panel').classList.remove('active');
}
window.closePanel = closePanel;

document.getElementById('panel-overlay').addEventListener('click', closePanel);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

// ========== RAYCASTER ==========
const raycaster = new THREE.Raycaster();
const mouseNDC = new THREE.Vector2();
const planetLabel = document.getElementById('planet-label');
const sunLabel = document.getElementById('sun-label');
let hoveredPlanet = null;

// ========== ANIMATION ==========
const clock = new THREE.Clock();
let hoverTarget = {};

function animate() {
  requestAnimationFrame(animate);
  const time = clock.getElapsedTime();

  // Camera
  cameraDistance += (targetDistance - cameraDistance) * 0.05;
  camera.position.x = cameraDistance * Math.sin(cameraAngle.phi) * Math.sin(cameraAngle.theta);
  camera.position.y = cameraDistance * Math.cos(cameraAngle.phi);
  camera.position.z = cameraDistance * Math.sin(cameraAngle.phi) * Math.cos(cameraAngle.theta);
  camera.lookAt(0, 0, 0);

  // Sun uniforms
  sun.children.forEach(child => {
    if (child.material && child.material.uniforms && child.material.uniforms.uTime) {
      child.material.uniforms.uTime.value = time;
    }
  });
  sun.rotation.y = time * 0.05;

  // Stars
  stars.material.uniforms.uTime.value = time;

  // Planets
  planetMeshes.forEach((group) => {
    const d = group.userData;
    d.angle += d.speed * 0.005;

    group.position.x = Math.cos(d.angle) * d.orbitRadius;
    group.position.z = Math.sin(d.angle) * d.orbitRadius;
    group.position.y = Math.sin(d.angle * 0.5) * d.orbitRadius * 0.03;

    d.planet.rotation.y += 0.005;
    d.planet.rotation.x = d.tilt;
    if (d.planet.material.uniforms) {
      d.planet.material.uniforms.uTime.value = time;
      d.planet.material.uniforms.uSunPos.value.set(0, 0, 0);

      // Hover animation
      const isHovered = hoveredPlanet === group;
      const target = isHovered ? 1 : 0;
      const current = d.planet.material.uniforms.uHover.value;
      d.planet.material.uniforms.uHover.value += (target - current) * 0.08;
    }

    // Atmosphere hover
    group.children.forEach(child => {
      if (child.userData.isAtmosphere && child.material.uniforms.uHover) {
        const isH = hoveredPlanet === group;
        const t = isH ? 1 : 0;
        const c = child.material.uniforms.uHover.value;
        child.material.uniforms.uHover.value += (t - c) * 0.08;
      }
      if (child.userData.ringMat) {
        child.userData.ringMat.uniforms.uTime.value = time;
      }
    });

    // Moon
    if (group.userData.moon) {
      const moon = group.userData.moon;
      const mAngle = time * moon.userData.speed;
      moon.position.x = Math.cos(mAngle) * moon.userData.orbitRadius;
      moon.position.z = Math.sin(mAngle) * moon.userData.orbitRadius;
      moon.position.y = Math.sin(mAngle * 0.5) * 3;
    }
  });

  // Raycasting (only when panel not open)
  if (!panelOpen) {
    raycaster.setFromCamera(mouseNDC, camera);
    const targets = planetMeshes.map(g => g.userData.planet);
    const intersects = raycaster.intersectObjects(targets);

    if (intersects.length > 0) {
      const hit = intersects[0].object;
      const parentGroup = planetMeshes.find(g => g.userData.planet === hit);
      if (parentGroup && hoveredPlanet !== parentGroup) {
        hoveredPlanet = parentGroup;
        planetLabel.textContent = parentGroup.userData.name;
        planetLabel.classList.add('visible');
        document.body.style.cursor = 'pointer';
      }
    } else {
      if (hoveredPlanet) {
        hoveredPlanet = null;
        planetLabel.classList.remove('visible');
        document.body.style.cursor = 'crosshair';
      }
    }
  }

  // Sun label fades based on zoom
  if (cameraDistance < 250) {
    sunLabel.classList.remove('visible');
  } else {
    sunLabel.classList.add('visible');
  }

  renderer.render(scene, camera);
}

animate();
</script>
